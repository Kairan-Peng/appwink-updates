<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AppWink Updates</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f6f8;
      --card: #ffffff;
      --text: #17202a;
      --muted: #5b6470;
      --line: #d8dde3;
      --accent: #0f766e;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(180deg, #eef3f2 0%, var(--bg) 100%);
      color: var(--text);
    }

    main {
      max-width: 760px;
      margin: 0 auto;
      padding: 56px 24px 80px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 28px;
      box-shadow: 0 18px 40px rgba(20, 32, 45, 0.06);
    }

    h1 {
      margin: 0 0 12px;
      font-size: 32px;
      line-height: 1.1;
    }

    p {
      margin: 0 0 14px;
      color: var(--muted);
      line-height: 1.6;
    }

    code {
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 0.95em;
      background: #f2f5f7;
      padding: 2px 6px;
      border-radius: 6px;
    }

    a {
      color: var(--accent);
      text-decoration: none;
    }

    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <main>
    <section class="card">
      <h1>AppWink Updates</h1>
      <p>This site hosts the public Sparkle update feed and release assets for AppWink.</p>
      <p>The canonical feed URL is <code>/appcast.xml</code>. Release payloads will appear under <code>/downloads/</code> and HTML release notes under <code>/release-notes/</code>.</p>
      <p>The main source repository remains separate at <a href="https://github.com/Kairan-Peng/AppWink">Kairan-Peng/AppWink</a>.</p>
    </section>
  </main>
</body>
</html>
